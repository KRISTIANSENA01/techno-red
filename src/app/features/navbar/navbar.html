<nav class="techno-topbar">
  <div class="container techno-row">
    <a class="techno-logo" routerLink="/">Techno Red</a>
    <small class="role-pill" *ngIf="roleLabel">{{ roleLabel }}</small>

    <div class="techno-actions">
      <a *ngIf="authService.canAccessPanel()" class="techno-item" routerLink="/panel">
        <i class="bi bi-speedometer2"></i>
        <span>Panel</span>
      </a>

      <a class="techno-item" [routerLink]="authService.isLoggedIn() ? '/account' : '/login'">
        <i class="bi bi-person"></i>
        <span>Mi cuenta</span>
      </a>

      <div class="mini-cart-zone">
        <a class="techno-item" routerLink="/cart">
          <div class="cart-icon-wrap">
            <i class="bi bi-cart3"></i>
            <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
          </div>
          <span>Mi carrito</span>
        </a>

        <div class="mini-cart-panel" *ngIf="cartCount > 0">
          <h5>Productos en mi carrito</h5>

          <div class="mini-cart-list" *ngIf="cartService.items$ | async as items">
            <article class="mini-item" *ngFor="let item of items">
              <img [src]="item.product.product_images?.[0]?.image_url || 'assets/placeholder.png'" />
              <div class="mini-item-body">
                <p class="mini-name">{{ item.product.name }}</p>
                <p class="mini-qty">Cantidad: {{ item.quantity }}</p>
                <p class="mini-price">$ {{ item.product.price }}</p>
              </div>
              <button class="mini-remove" (click)="removeFromMiniCart(item.product.id)">
                <i class="bi bi-trash3"></i>
              </button>
            </article>
          </div>

          <div class="mini-subtotal">
            <span>Subtotal</span>
            <strong>$ {{ cartSubtotal }}</strong>
          </div>
          <a routerLink="/cart" class="btn mini-cart-btn">Ir a carro de compras</a>
        </div>
      </div>

      <button
        *ngIf="showLogoutIcon"
        class="btn techno-logout"
        (click)="logout()"
        title="Cerrar sesion"
        aria-label="Cerrar sesion"
      >
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>
</nav>
